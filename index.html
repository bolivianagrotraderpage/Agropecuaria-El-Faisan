<!DOCTYPE html>
<html lang="es-BO">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agropecuaria El Faisán — Panel de Costos</title>
  <meta name="description" content="Panel de visualización de costos de Agropecuaria El Faisán, alimentado en vivo desde Google Sheets." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="wrap">
    <header class="site-header">
      <div class="brand-mark">
        <span class="brand-glyph" aria-hidden="true">
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 6c4 5 4 10 0 15-4-5-4-10 0-15Z" fill="#D4A72C"/>
            <path d="M22 15c5 3 7 8 5 14-6-1-9-6-9-14 1.3 0 2.7 0 4 0Z" fill="#7C8A55"/>
            <path d="M22 15c-5 3-7 8-5 14 6-1 9-6 9-14-1.3 0-2.7 0-4 0Z" fill="#7C8A55" opacity="0.7"/>
            <path d="M22 29v9" stroke="#D4A72C" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        <div class="brand-text">
          <h1 id="company-name">Agropecuaria El Faisán</h1>
          <div class="tagline" id="tagline">Panel de Costos</div>
        </div>
      </div>
      <div class="header-meta">
        <span id="location">Santa Cruz, Bolivia</span>
        <span id="updated">Actualizado: —</span>
      </div>
    </header>

    <div class="controls">
      <input
        type="search"
        id="search"
        class="search-input"
        placeholder="Buscar por concepto…"
        aria-label="Buscar por concepto"
      />
      <button id="refresh-btn" class="refresh-btn" type="button">Actualizar datos</button>
    </div>

    <div class="status-line">
      <span id="status" class="status">Cargando datos…</span>
    </div>

    <section id="total-card" class="total-card hidden" aria-live="polite">
      <span id="total-label">Total</span>
      <span id="total-value">—</span>
    </section>

    <main id="grid" class="grid" aria-live="polite"></main>

    <footer class="site-footer">
      Agropecuaria El Faisán · Datos desde Google Sheets
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
