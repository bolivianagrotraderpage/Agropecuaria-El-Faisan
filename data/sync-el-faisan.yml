name: Sync El Faisán data

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch: {}    # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run sync script
        id: sync
        run: python data/sync_el_faisan.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed/history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync El Faisán data [automated]"
            git push
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Sync El Faisán data failed",
              body: `The scheduled sync failed. Check the run log:\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
